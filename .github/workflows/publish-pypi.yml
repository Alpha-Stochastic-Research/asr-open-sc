name: Publish package to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Test, build, and validate distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Install package and development dependencies
        run: |
          python -m pip install -e ".[dev,risk]"

      - name: Run tests
        run: |
          pytest -q

      - name: Verify registry import
        run: |
          python -c "import asr.open_sc; print(asr.open_sc.__version__)"

      - name: Verify tail-risk extra
        run: |
          python -c "from asr.risk.tail import TailRiskConfig; print(TailRiskConfig())"

      - name: Build wheel and source distribution
        run: |
          python -m build

      - name: Validate distributions
        run: |
          python -m twine check dist/*

      - name: Store distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error


  publish:
    name: Publish distributions to PyPI
    needs:
      - build

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/asr-open-sc

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
