name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test ASR open-science meta-package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package with development dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Verify public import
        run: |
          python - <<'PY'
          import asr.open_sc as asr_sc

          print("ASR open-science package version:", asr_sc.__version__)
          asr_sc.print_ecosystem()
          PY

      - name: Run tests
        run: |
          pytest -q

      - name: Build package
        run: |
          python -m build

      - name: Check package distribution
        run: |
          twine check dist/*
